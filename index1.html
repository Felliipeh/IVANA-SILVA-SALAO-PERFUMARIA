<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivana Silva - Salão & Perfumaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        body { 
            background-color: #faf7f5; 
        }
        
        .bg-header-mobile {
            background: linear-gradient(180deg, #b88364 0%, #cc9575 100%);
            border-bottom-left-radius: 50% 12vw; 
            border-bottom-right-radius: 50% 12vw;
            height: 140px;
        }

        .btn-destaque {
            background: linear-gradient(90deg, #ba8363 0%, #cc9575 100%);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-destaque:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(186, 131, 99, 0.3);
        }

        .btn-clean {
            background-color: #ffffff;
            border: 1px solid rgba(204, 149, 117, 0.18);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-clean:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(36, 25, 20, 0.05);
            background-color: #fffbf9;
        }

        .btn-destaque:active, .btn-clean:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="font-sans antialiased text-[#4a362c] min-h-screen flex flex-col justify-between">

    <div class="w-full flex-grow">
        
        <header class="bg-header-mobile w-full relative flex justify-center lg:hidden">
            <button id="shareBtnMobile" class="absolute top-4 right-4 w-11 h-11 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center text-[#ba8363] shadow-md border border-white/20 active:scale-95 z-20" title="Compartilhar">
                <i class="fa-solid fa-share-nodes text-base"></i>
            </button>

            <div class="absolute -bottom-12 w-32 h-32 bg-[#241914] rounded-full p-2.5 shadow-xl flex items-center justify-center border-2 border-[#cc9575] z-10">
                <img src="/img/logo1.png" alt="Logo Ivana Silva" class="w-[95%] h-auto object-contain">
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 mt-16 pb-8 lg:mt-0 lg:pb-0 lg:max-w-5xl lg:px-8 lg:grid lg:grid-cols-12 lg:gap-12 lg:items-center lg:min-h-[80vh]">
            
            <section class="lg:col-span-5 text-center lg:text-left space-y-6 lg:border-r lg:border-[#cc9575]/20 lg:pr-12">
                <div class="hidden lg:flex w-40 h-40 bg-[#241914] rounded-full p-3 shadow-2xl items-center justify-center border-2 border-[#cc9575] mb-6">
                    <img src="/img/logo1.png" alt="Logo Ivana Silva" class="w-[95%] h-auto object-contain">
                </div>

                <div class="space-y-2 lg:space-y-3">
                    <p class="text-lg lg:text-xl font-medium text-[#ba8363] italic font-serif tracking-wide">
                        "Um novo conceito de beleza"
                    </p>
                    <div class="flex items-center justify-center lg:justify-start gap-2">
                        <span class="h-[1px] w-6 bg-[#cc9575]/40"></span>
                        <p class="text-[11px] lg:text-xs uppercase tracking-[0.22em] text-[#6e584f]/90 font-bold">
                            Elevando sua autoestima
                        </p>
                        <span class="h-[1px] w-6 bg-[#cc9575]/40 lg:hidden"></span>
                    </div>
                </div>

                <div class="hidden lg:block pt-2">
                    <button id="shareBtnDesktop" class="inline-flex items-center gap-2.5 px-5 py-2.5 bg-white text-[#ba8363] text-xs font-bold uppercase tracking-wider rounded-xl shadow-sm border border-[#cc9575]/30 hover:bg-[#ba8363] hover:text-white transition-all duration-300">
                        <i class="fa-solid fa-share-nodes"></i> Compartilhar Espaço
                    </button>
                </div>
            </section>

            <section class="mt-10 lg:mt-0 lg:col-span-7 space-y-5 lg:space-y-4">

                <a href="https://wa.me/559882167881" target="_blank" rel="noopener noreferrer" class="btn-destaque flex items-center justify-between p-5 rounded-2xl text-white shadow-md relative">
                    <div class="flex items-center">
                        <div class="mr-4 w-7 h-7 flex items-center justify-center text-white flex-shrink-0">
                            <i class="fa-brands fa-whatsapp text-2xl"></i>
                        </div>
                        <span class="font-bold text-base tracking-wide">Agendamento / Dúvidas</span>
                    </div>
                    <i class="fas fa-chevron-right text-sm opacity-80"></i>
                </a>

                <a href="https://maps.app.goo.gl/TZysTfkHNkqj4cZh7" target="_blank" rel="noopener noreferrer" class="btn-clean flex items-center justify-between p-5 rounded-2xl text-[#4a362c] shadow-sm relative">
                    <div class="flex items-center">
                        <div class="mr-4 w-7 h-7 flex items-center justify-center text-[#ba8363] flex-shrink-0">
                            <i class="fas fa-location-dot text-xl"></i>
                        </div>
                        <span class="font-bold text-base tracking-wide text-[#5a453a]">Endereço & Localização</span>
                    </div>
                    <i class="fas fa-chevron-right text-sm text-[#cc9575]/70"></i>
                </a>

                <a href="https://wa.me/559882167881?text=Olá,%20Ivana!%20Gostaria%20de%20receber%20o%20catálogo%20de%20perfumes%20disponíveis." target="_blank" rel="noopener noreferrer" class="btn-clean flex items-center justify-between p-5 rounded-2xl text-[#4a362c] shadow-sm relative">
                    <div class="flex items-center">
                        <div class="mr-4 w-7 h-7 flex items-center justify-center text-[#ba8363] flex-shrink-0">
                            <i class="fas fa-bottle-droplet text-xl"></i>
                        </div>
                        <span class="font-bold text-base tracking-wide text-[#5a453a]">Solicitar Catálogo de Perfumes</span>
                    </div>
                    <i class="fas fa-chevron-right text-sm text-[#cc9575]/70"></i>
                </a>

                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="btn-clean flex items-center justify-between p-5 rounded-2xl text-[#4a362c] shadow-sm relative">
                    <div class="flex items-center">
                        <div class="mr-4 w-7 h-7 flex items-center justify-center text-[#ba8363] flex-shrink-0">
                            <i class="fa-brands fa-instagram text-2xl"></i>
                        </div>
                        <span class="font-bold text-base tracking-wide text-[#5a453a]">Ver Fotos dos Trabalhos</span>
                    </div>
                    <i class="fas fa-chevron-right text-sm text-[#cc9575]/70"></i>
                </a>
                
            </section>
        </main>
    </div>

    <footer class="w-full pt-12 pb-6 text-center text-[#6e584f]/70 text-[10px] tracking-wider uppercase bg-transparent">
        <p>Ivana Silva Salão & Perfumaria © 2026</p>
        <p class="mt-1 font-medium">
            Desenvolvido por 
            <a href="https://menubairro.com.br" target="_blank" rel="noopener noreferrer" class="text-[#ba8363] hover:underline font-bold transition-all">
                Menubairro
            </a>
        </p>
    </footer>

    <script>
        const shareHandler = async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Ivana Silva - Salão & Perfumaria',
                        text: 'Confira os serviços, perfumaria e agende seu horário na Ivana Silva!',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Compartilhamento cancelado');
                }
            } else {
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    ['shareBtnMobile', 'shareBtnDesktop'].forEach(id => {
                        const btn = document.getElementById(id);
                        if(btn) {
                            const originalContent = btn.innerHTML;
                            btn.innerHTML = id === 'shareBtnMobile' 
                                ? '<i class="fa-solid fa-check text-green-600"></i>'
                                : '<i class="fa-solid fa-check"></i> Link Copiado!';
                            setTimeout(() => btn.innerHTML = originalContent, 2000);
                        }
                    });
                } catch (err) {
                    console.error('Falha ao copiar:', err);
                }
            }
        };

        const mobileBtn = document.getElementById('shareBtnMobile');
        const desktopBtn = document.getElementById('shareBtnDesktop');
        
        if(mobileBtn) mobileBtn.addEventListener('click', shareHandler);
        if(desktopBtn) desktopBtn.addEventListener('click', shareHandler);
    </script>

</body>
</html>
