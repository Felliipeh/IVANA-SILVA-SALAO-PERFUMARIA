<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivana Silva - Salão & Perfumaria</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <style>
        /* Reset de Layout Moderno */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #faf7f5;
            background-image: radial-gradient(circle at 50% 0%, #fefcfb 0%, #faf7f5 100%);
            font-family: 'Inter', sans-serif;
            color: #4a362c;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            padding: 40px 24px 35px 24px;
            overflow-x: hidden;
        }

        /* Animações de Entrada Globais */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(150%) skewX(-25deg); }
        }

        /* Botão de Compartilhar Absoluto */
        .share-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 46px;
            height: 46px;
            background: #ffffff;
            border: 1px solid rgba(204, 149, 117, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ba8363;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(204, 149, 117, 0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .share-btn:hover {
            background: #ffffff;
            border-color: #ba8363;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(204, 149, 117, 0.12);
        }
        
        .share-btn:active {
            transform: scale(0.95);
        }

        /* Container Principal */
        .container {
            width: 100%;
            max-width: 430px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            justify-content: center; 
        }

        /* HEADER */
        .profile-header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px; 
            animation: fadeInDown 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Logotipo Centralizado */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px 0;
        }

        .logo {
            width: 170px; 
            height: auto;
            max-width: 85%;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(36, 25, 20, 0.03));
        }

        /* CONTAINER DE LINKS */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px; 
            margin-bottom: 20px;
        }

        /* ESTILO DOS BOTÕES MAXI */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 26px; 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(204, 149, 117, 0.25);
            border-radius: 16px; 
            text-decoration: none;
            color: #4a362c;
            font-weight: 500;
            font-size: 16px; 
            letter-spacing: 0.2px;
            box-shadow: 0 4px 12px rgba(74, 54, 44, 0.03); 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Configuração inicial para entrada fluida */
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Escalonamento da animação em cascata (Stagger effect) */
        .link-item:nth-child(1) { animation-delay: 0.15s; }
        .link-item:nth-child(2) { animation-delay: 0.25s; }
        .link-item:nth-child(3) { animation-delay: 0.35s; }
        .link-item:nth-child(4) { animation-delay: 0.45s; }

        .link-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .link-content i {
            color: #ba8363;
            font-size: 22px; 
            width: 30px;
            text-align: center;
        }

        .arrow-icon {
            font-size: 13px;
            color: #cc9575;
            opacity: 0.4;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
        }

        /* Micro-interações ao passar o mouse */
        .link-item:hover {
            background: #ffffff;
            border-color: #ba8363;
            transform: translateY(-3px); 
            box-shadow: 0 8px 24px rgba(186, 131, 99, 0.08);
        }

        .link-item:hover .arrow-icon {
            transform: translateX(5px);
            opacity: 0.9;
        }
        
        .link-item:active {
            transform: scale(0.98) translateY(-1px); 
        }

        /* BOTÃO DE AGENDAMENTO EM DESTAQUE MÁXIMO + SHIMMER EFFECT */
        .featured {
            background: linear-gradient(90deg, #ba8363 0%, #cc9575 100%);
            color: #ffffff;
            border: none;
            font-weight: 600;
            box-shadow: 0 6px 18px rgba(186, 131, 99, 0.22);
            position: relative;
            overflow: hidden;
        }

        /* Brilho sofisticado passando pelo botão */
        .featured::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: translateX(-150%) skewX(-25deg);
            animation: shimmer 4.5s infinite ease-in-out;
            animation-delay: 1.5s;
        }

        .featured .link-content i, 
        .featured .arrow-icon {
            color: #ffffff;
            opacity: 1;
        }

        .featured:hover {
            background: linear-gradient(90deg, #b07959 0%, #c48c6b 100%);
            box-shadow: 0 8px 24px rgba(186, 131, 99, 0.32);
        }

        /* FOOTER FIXADO EM BAIXO */
        .footer {
            margin-top: 50px;
            width: 100%;
            max-width: 430px;
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: 0.55s;
        }

        .footer p {
            font-size: 10px;
            color: #6e584f;
            opacity: 0.5;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .footer a {
            font-size: 10px;
            color: #ba8363;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: opacity 0.2s ease;
        }

        .footer a:hover {
            opacity: 0.8;
        }

        /* COMPORTAMENTO DESKTOP */
        @media (min-width: 768px) {
            body {
                padding-top: 80px;
                padding-bottom: 50px;
            }

            .share-btn {
                top: 30px;
                right: 40px;
            }

            .container {
                max-width: 460px; 
                justify-content: flex-start; 
            }

            .profile-header {
                margin-bottom: 45px;
            }

            .logo {
                width: 185px; 
            }

            .link-item {
                padding: 24px 30px; 
                font-size: 17px;
            }
            
            .footer {
                margin-top: 70px;
            }
        }
    </style>
</head>
<body>

    <div id="shareBtn" class="share-btn" title="Compartilhar Perfil">
        <i class="fa-solid fa-share-nodes"></i>
    </div>

    <div class="container">
        
        <header class="profile-header">
            <div class="logo-wrapper">
                <img src="/img/logo1.png" alt="Ivana Silva Salão & Perfumaria" class="logo">
            </div>
        </header>
            
        <main class="links-container">
            
            <a href="https://wa.me/559882167881" target="_blank" rel="noopener noreferrer" class="link-item featured">
                <div class="link-content">
                    <i class="fa-brands fa-whatsapp"></i>
                    <span>Agendamento / Dúvidas</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="https://maps.app.goo.gl/TZysTfkHNkqj4cZh7" target="_blank" rel="noopener noreferrer" class="link-item">
                <div class="link-content">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Endereço & Localização</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="https://wa.me/559882167881?text=Olá,%20Ivana!%20Gostaria%20de%20receber%20o%20catálogo%20de%20perfumes%20disponíveis." target="_blank" rel="noopener noreferrer" class="link-item">
                <div class="link-content">
                    <i class="fa-solid fa-bottle-droplet"></i>
                    <span>Solicitar Catálogo de Perfumes</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>
            
            <a href="https://instagram.com/ivanna_silvva/" target="_blank" rel="noopener noreferrer" class="link-item">
                <div class="link-content">
                    <i class="fa-brands fa-instagram"></i>
                    <span>Ver Fotos dos Trabalhos</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>
        </main>
    </div>

    <footer class="footer">
        <p>Ivana Silva Salão & Perfumaria © 2026</p>
        <p style="margin-top: 4px;">Desenvolvido por <a href="https://wa.me/5598984021537?text=Ol%C3%A1!%20Vim%20pelo%20site%20da%20Ivana%20e%20gostaria%20de%20saber%20como%20adquirir%20para%20meu%20neg%C3%B3cio." target="_blank" rel="noopener noreferrer">Menubairro</a></p>
    </footer>

    <script>
        document.getElementById('shareBtn').addEventListener('click', async () => {
            const btn = document.getElementById('shareBtn');
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Ivana Silva - Salão & Perfumaria',
                        text: 'Confira os serviços, perfumaria e agende seu horário na Ivana Silva!',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Compartilhamento cancelado');
                }
            } else {
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    const originalContent = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-check" style="color: #22c55e;"></i>';
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                    }, 2000);
                } catch (err) {
                    console.error('Erro ao copiar link:', err);
                }
            }
        });
    </script>

</body>
</html>
